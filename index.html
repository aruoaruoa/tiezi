<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>贴字</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700&family=Noto+Serif+SC:wght@300&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4f5f3;
    --ink:#16181b;
    --ink-soft:#5b5f66;
    --line:#dcded9;
    --indigo:#22406b;
    --stamp:#b3382f;
    --panel:#ffffff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",Roboto,sans-serif;
    overscroll-behavior:none;
  }
  #app{
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    height:100dvh;
  }
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px calc(10px + env(safe-area-inset-top,0px)) 16px;
    padding-top:calc(14px + env(safe-area-inset-top,0px));
    border-bottom:1px solid var(--line);
    background:var(--paper);
    flex-shrink:0;
  }
  .brand{ display:flex; align-items:center; gap:8px; }
  .seal{
    width:22px; height:22px; background:var(--stamp); color:#fff;
    border-radius:4px; display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; font-family:"Noto Serif SC",serif; flex-shrink:0;
  }
  .brand-name{ font-size:16px; font-weight:700; letter-spacing:0.02em; }
  #newImgBtn{
    border:1px solid var(--line); background:var(--panel); color:var(--ink-soft);
    font-size:13px; padding:6px 12px; border-radius:20px; display:none;
  }
  #stage{
    flex:1; min-height:0;
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
    background:
      linear-gradient(45deg,#e8e9e5 25%,transparent 25%) -8px 0/16px 16px,
      linear-gradient(-45deg,#e8e9e5 25%,transparent 25%) -8px 0/16px 16px,
      linear-gradient(45deg,transparent 75%,#e8e9e5 75%) -8px 0/16px 16px,
      linear-gradient(-45deg,transparent 75%,#e8e9e5 75%) -8px 0/16px 16px,
      var(--paper);
  }
  #dropzone{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; width:82%; max-width:340px; aspect-ratio:3/4;
    border:1.5px dashed #b7bab3; border-radius:16px; color:var(--ink-soft);
    text-align:center; padding:24px;
  }
  #dropzone .big{
    width:52px; height:52px; border-radius:50%; background:var(--indigo);
    color:#fff; display:flex; align-items:center; justify-content:center; font-size:26px;
  }
  #dropzone .hint{ font-size:13px; line-height:1.6; color:var(--ink-soft); }
  #pickBtn{
    margin-top:4px; background:var(--indigo); color:#fff; border:none;
    padding:10px 22px; border-radius:22px; font-size:14px; font-weight:600;
  }
  canvas{ max-width:100%; max-height:100%; touch-action:none; display:none; }
  #controls{
    flex-shrink:0; background:var(--panel); border-top:1px solid var(--line);
    padding:14px 16px calc(14px + env(safe-area-inset-bottom,0px)) 16px;
    display:none; flex-direction:column; gap:14px;
    max-height:52dvh; overflow-y:auto;
  }
  textarea{
    width:100%; resize:none; border:1px solid var(--line); border-radius:10px;
    padding:10px 12px; font-size:15px; font-family:inherit; color:var(--ink);
    background:var(--paper); min-height:44px;
  }
  .row{ display:flex; align-items:center; gap:10px; }
  .row.wrap{ flex-wrap:wrap; }
  .label{ font-size:12px; color:var(--ink-soft); width:44px; flex-shrink:0; }
  .fonts{ display:grid; grid-template-columns:1fr 1fr; gap:8px; flex:1; }
  .font-pill{
    flex:1; text-align:center; padding:8px 4px; border-radius:10px;
    border:1.5px solid var(--line); background:var(--paper); font-size:15px; color:var(--ink);
  }
  .font-pill.active{ border-color:var(--indigo); background:#eef1f6; color:var(--indigo); }
  .aligns{ display:flex; gap:8px; flex:1; }
  .align-pill{
    flex:1; text-align:center; padding:8px 4px; border-radius:10px;
    border:1.5px solid var(--line); background:var(--paper); font-size:13px; color:var(--ink);
  }
  .align-pill.active{ border-color:var(--indigo); background:#eef1f6; color:var(--indigo); }
  input[type=range]{ flex:1; accent-color:var(--indigo); }
  .swatches{ display:flex; gap:8px; }
  .swatch{
    width:26px; height:26px; border-radius:50%; border:2px solid var(--line);
    flex-shrink:0; position:relative;
  }
  .swatch.active{ border-color:var(--indigo); }
  .swatch.custom{
    background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red);
  }
  .swatch input[type=color]{
    position:absolute; inset:0; opacity:0; width:100%; height:100%; border:none; padding:0;
  }
  .toggle{
    width:40px; height:24px; border-radius:12px; background:var(--line); position:relative; flex-shrink:0;
  }
  .toggle.on{ background:var(--indigo); }
  .toggle::after{
    content:""; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%;
    background:#fff; transition:transform .15s ease;
  }
  .toggle.on::after{ transform:translateX(16px); }
  #exportBtn{
    width:100%; padding:13px; border:none; border-radius:12px; background:var(--stamp);
    color:#fff; font-size:15px; font-weight:700; letter-spacing:0.02em;
  }
  #exportBtn:disabled{ opacity:.4; }
  #fileInput{ display:none; }
  .toast{
    position:fixed; left:50%; bottom:100px; transform:translateX(-50%);
    background:var(--ink); color:#fff; font-size:13px; padding:9px 16px; border-radius:20px;
    opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .toast.show{ opacity:.92; }
  #saveOverlay{
    display:none; position:fixed; inset:0; z-index:1000;
    background:rgba(10,10,10,.94);
    flex-direction:column; align-items:center; justify-content:center; gap:16px;
    padding:24px; padding-top:calc(24px + env(safe-area-inset-top,0px));
    padding-bottom:calc(24px + env(safe-area-inset-bottom,0px));
  }
  #saveOverlay.show{ display:flex; }
  #saveHint{ color:#fff; font-size:14px; text-align:center; line-height:1.6; }
  #saveImg{ max-width:100%; max-height:65dvh; border-radius:8px; box-shadow:0 4px 24px rgba(0,0,0,.4); }
  #closeSaveOverlay{
    border:1px solid rgba(255,255,255,.4); background:transparent; color:#fff;
    padding:9px 24px; border-radius:20px; font-size:14px;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <div class="seal">貼</div>
      <div class="brand-name">贴字</div>
    </div>
    <button id="newImgBtn">换图片</button>
  </header>

  <div id="stage">
    <div id="dropzone">
      <div class="big">＋</div>
      <div>点击选择一张图片</div>
      <div class="hint">本地处理，不上传服务器<br>导出保持原图分辨率，PNG 无损</div>
      <button id="pickBtn">选择图片</button>
    </div>
    <canvas id="canvas"></canvas>
  </div>

  <div id="controls">
    <textarea id="textInput" rows="2" placeholder="输入要加的文字…">在这里输入文字</textarea>

    <div class="row">
      <div class="label">字体</div>
      <div class="fonts">
        <div class="font-pill" data-font="'Noto Sans SC'" data-weight="700" style="font-family:'Noto Sans SC';font-weight:700;">黑体</div>
        <div class="font-pill active" data-font="'Noto Serif SC'" data-weight="300" style="font-family:'Noto Serif SC';font-weight:300;">思源宋体</div>
        <div class="font-pill" data-font="'Zhi Mang Xing'" data-weight="400" style="font-family:'Zhi Mang Xing';">手写</div>
        <div class="font-pill" data-font="-apple-system, BlinkMacSystemFont, 'PingFang SC'" data-weight="700" style="font-family:-apple-system, BlinkMacSystemFont, 'PingFang SC';font-weight:700;">系统黑体</div>
      </div>
    </div>

    <div class="row">
      <div class="label">对齐</div>
      <div class="aligns" id="alignPills">
        <div class="align-pill" data-align="left">左对齐</div>
        <div class="align-pill active" data-align="center">居中</div>
        <div class="align-pill" data-align="right">右对齐</div>
      </div>
    </div>

    <div class="row">
      <div class="label">字号</div>
      <input type="range" id="sizeRange" min="3" max="20" value="8" step="0.5">
    </div>

    <div class="row wrap">
      <div class="label">颜色</div>
      <div class="swatches" id="colorSwatches">
        <div class="swatch active" data-color="#ffffff" style="background:#ffffff;"></div>
        <div class="swatch" data-color="#16181b" style="background:#16181b;"></div>
        <div class="swatch" data-color="#22406b" style="background:#22406b;"></div>
        <div class="swatch" data-color="#b3382f" style="background:#b3382f;"></div>
        <div class="swatch custom">
          <input type="color" id="customColor" value="#ffffff">
        </div>
      </div>
    </div>

    <div class="row">
      <div class="label">背景</div>
      <div class="toggle on" id="bgToggle"></div>
      <div class="swatches" id="bgSwatches">
        <div class="swatch active" data-bgcolor="#16181b" style="background:#16181b;"></div>
        <div class="swatch" data-bgcolor="#ffffff" style="background:#ffffff;"></div>
      </div>
    </div>

    <button id="exportBtn" disabled>保存图片</button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*">
<div class="toast" id="toast">已保存</div>

<div id="saveOverlay">
  <div id="saveHint">长按下面的图片，选择"存储图像 / 添加到照片"保存到相册</div>
  <img id="saveImg" alt="导出的图片">
  <button id="closeSaveOverlay">关闭</button>
</div>

<script>
const state = {
  img: null,
  naturalW: 0, naturalH: 0,
  text: "在这里输入文字",
  font: "'Noto Serif SC'",
  fontWeight: "300",
  sizeFrac: 0.08,   // fraction of image width
  color: "#ffffff",
  align: "center",  // 'left' | 'center' | 'right'
  bgOn: true,
  bgColor: "#16181b",
  // position as fraction of image width/height, anchor = center of text block
  posX: 0.5,
  posY: 0.5,
};

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const stage = document.getElementById('stage');
const dropzone = document.getElementById('dropzone');
const controls = document.getElementById('controls');
const newImgBtn = document.getElementById('newImgBtn');
const fileInput = document.getElementById('fileInput');
const pickBtn = document.getElementById('pickBtn');
const exportBtn = document.getElementById('exportBtn');
const textInput = document.getElementById('textInput');
const sizeRange = document.getElementById('sizeRange');
const bgToggle = document.getElementById('bgToggle');
const bgSwatches = document.getElementById('bgSwatches');
const toast = document.getElementById('toast');

let displayScale = 1; // canvas.width(px) per 1 image natural px... actually canvas drawn at natural res, CSS scales down.

function fontStack(f){ return f + ", sans-serif"; }

function lines(){ return (state.text || "").split("\n").filter(l => l.length || true); }

function measureBlock(fontPx){
  ctx.font = `${state.fontWeight} ${fontPx}px ${fontStack(state.font)}`;
  const L = lines();
  let maxW = 0;
  L.forEach(l => { const w = ctx.measureText(l || " ").width; if (w > maxW) maxW = w; });
  const lineH = fontPx * 1.32;
  return { maxW, lineH, totalH: lineH * L.length, lines: L };
}

function render(){
  if (!state.img) return;
  canvas.width = state.naturalW;
  canvas.height = state.naturalH;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(state.img, 0, 0, state.naturalW, state.naturalH);

  const fontPx = state.sizeFrac * state.naturalW;
  const block = measureBlock(fontPx);
  const cx = state.posX * state.naturalW;
  const cy = state.posY * state.naturalH;
  const padX = fontPx * 0.35;
  const padY = fontPx * 0.28;

  if (state.bgOn){
    const bw = block.maxW + padX*2;
    const bh = block.totalH + padY*2;
    ctx.fillStyle = state.bgColor;
    const r = Math.min(14, bh*0.18);
    roundRect(cx - bw/2, cy - bh/2, bw, bh, r);
    ctx.fill();
  }

  ctx.font = `${state.fontWeight} ${fontPx}px ${fontStack(state.font)}`;
  ctx.fillStyle = state.color;
  ctx.textBaseline = 'middle';
  let lineX = cx, textAlignSetting = 'center';
  if (state.align === 'left'){ lineX = cx - block.maxW/2; textAlignSetting = 'left'; }
  else if (state.align === 'right'){ lineX = cx + block.maxW/2; textAlignSetting = 'right'; }
  ctx.textAlign = textAlignSetting;
  const startY = cy - block.totalH/2 + block.lineH/2;
  block.lines.forEach((l, i) => {
    ctx.fillText(l, lineX, startY + i*block.lineH);
  });
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function loadImage(file){
  if (!file) { showToast('没有选到文件'); return; }
  if (file.type && !file.type.startsWith('image/')){
    showToast('这不是图片文件');
    return;
  }
  const reader = new FileReader();
  reader.onerror = () => showToast('读取图片失败，换一张试试');
  reader.onload = () => {
    const im = new Image();
    im.onerror = () => showToast('这张图片无法打开（格式可能不支持）');
    im.onload = () => {
      state.img = im;
      state.naturalW = im.naturalWidth;
      state.naturalH = im.naturalHeight;
      state.posX = 0.5; state.posY = 0.5;
      dropzone.style.display = 'none';
      canvas.style.display = 'block';
      controls.style.display = 'flex';
      newImgBtn.style.display = 'inline-block';
      exportBtn.disabled = false;
      document.fonts.ready.then(render);
      render();
    };
    im.src = reader.result;
  };
  reader.readAsDataURL(file);
}

pickBtn.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('click', (e) => { if (e.target === pickBtn) return; fileInput.click(); });
newImgBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  const f = e.target.files[0];
  if (f) loadImage(f);
});

textInput.addEventListener('input', () => {
  state.text = textInput.value;
  render();
});

document.querySelectorAll('.align-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.align-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    state.align = pill.dataset.align;
    render();
  });
});

document.querySelectorAll('.font-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.font-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    state.font = pill.dataset.font;
    state.fontWeight = pill.dataset.weight || "700";
    document.fonts.load(`${state.fontWeight} 40px ${state.font}`).then(render);
  });
});

sizeRange.addEventListener('input', () => {
  state.sizeFrac = Number(sizeRange.value) / 100;
  render();
});

document.getElementById('colorSwatches').addEventListener('click', (e) => {
  const sw = e.target.closest('.swatch');
  if (!sw || !sw.dataset.color) return;
  document.querySelectorAll('#colorSwatches .swatch').forEach(s => s.classList.remove('active'));
  sw.classList.add('active');
  state.color = sw.dataset.color;
  render();
});
document.getElementById('customColor').addEventListener('input', (e) => {
  state.color = e.target.value;
  document.querySelectorAll('#colorSwatches .swatch').forEach(s => s.classList.remove('active'));
  e.target.closest('.swatch').classList.add('active');
  render();
});

bgToggle.addEventListener('click', () => {
  state.bgOn = !state.bgOn;
  bgToggle.classList.toggle('on', state.bgOn);
  bgSwatches.style.opacity = state.bgOn ? 1 : 0.35;
  bgSwatches.style.pointerEvents = state.bgOn ? 'auto' : 'none';
  render();
});
bgSwatches.addEventListener('click', (e) => {
  const sw = e.target.closest('.swatch');
  if (!sw || !sw.dataset.bgcolor) return;
  document.querySelectorAll('#bgSwatches .swatch').forEach(s => s.classList.remove('active'));
  sw.classList.add('active');
  state.bgColor = sw.dataset.bgcolor;
  render();
});

// --- drag to reposition text ---
let dragging = false;
let dragOffset = {x:0, y:0};

function canvasPointToImage(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const scaleX = state.naturalW / rect.width;
  const scaleY = state.naturalH / rect.height;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function hitTest(px, py){
  const fontPx = state.sizeFrac * state.naturalW;
  const block = measureBlock(fontPx);
  const cx = state.posX * state.naturalW;
  const cy = state.posY * state.naturalH;
  const padX = fontPx * 0.5;
  const padY = fontPx * 0.5;
  const bw = block.maxW + padX*2;
  const bh = block.totalH + padY*2;
  return Math.abs(px - cx) < bw/2 && Math.abs(py - cy) < bh/2;
}

canvas.addEventListener('pointerdown', (e) => {
  const p = canvasPointToImage(e.clientX, e.clientY);
  if (hitTest(p.x, p.y)){
    dragging = true;
    dragOffset.x = p.x - state.posX*state.naturalW;
    dragOffset.y = p.y - state.posY*state.naturalH;
    canvas.setPointerCapture(e.pointerId);
  }
});
canvas.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  const p = canvasPointToImage(e.clientX, e.clientY);
  state.posX = Math.min(1, Math.max(0, (p.x - dragOffset.x) / state.naturalW));
  state.posY = Math.min(1, Math.max(0, (p.y - dragOffset.y) / state.naturalH));
  render();
});
canvas.addEventListener('pointerup', () => { dragging = false; });
canvas.addEventListener('pointercancel', () => { dragging = false; });

function showToast(msg){
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1400);
}

const saveOverlay = document.getElementById('saveOverlay');
const saveImg = document.getElementById('saveImg');
document.getElementById('closeSaveOverlay').addEventListener('click', () => {
  saveOverlay.classList.remove('show');
});

function showSaveOverlay(){
  saveImg.src = canvas.toDataURL('image/png'); // PNG 无损，不压缩画质
  saveOverlay.classList.add('show');
}

exportBtn.addEventListener('click', async () => {
  render();

  // 优先：系统分享面板（可直接存到相册）
  try {
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    if (blob){
      const file = new File([blob], `贴字_${Date.now()}.png`, { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [file] })){
        try {
          await navigator.share({ files: [file] });
          return;
        } catch (err){
          if (err && err.name === 'AbortError') return; // 用户自己取消，不用兜底
        }
      }
    }
  } catch (e){ /* 走兜底方案 */ }

  // 兜底：页面内展示图片，长按保存
  showSaveOverlay();
});

window.addEventListener('resize', render);
</script>
</body>
</html>
